<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>そらとぶ医局 — 僻地スポット勤務プラットフォーム</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#076270">

  <div id="hdr-right" class="hdr-right"></div>

<main class="wrap" id="root"></main>

  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
